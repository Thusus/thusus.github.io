<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="referrer" content="strict-origin-when-cross-origin">
<title>KidsTube</title>
<style>
  :root { --bg:#11151c; --tile:#1c2230; --tile-hover:#27304370; --text:#f2f5fa; --accent:#ff5a5f; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { margin:0; height:100%; }
  body { background:var(--bg); color:var(--text); font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif; overflow-x:hidden; }

  #topbar { display:flex; align-items:center; gap:10px; padding:16px 20px 4px; }
  #back { display:none; width:44px; height:44px; border-radius:50%; border:none; background:#1c2230; color:var(--text); font-size:26px; line-height:1; cursor:pointer; flex:0 0 auto; }
  #back.show { display:block; }
  header { font-size:clamp(22px,3.4vw,32px); font-weight:900; letter-spacing:0.3px; }
  header .brandname { color:var(--accent); }
  #note { padding:0 20px; font-size:14px; opacity:0.6; }

  #testbar { display:none; gap:10px; align-items:center; flex-wrap:wrap; margin:8px 20px; padding:10px 14px; background:#0d1b2a; border:1px solid #24425f; border-radius:12px; font-size:14px; }
  #testbar input[type=date] { font-size:15px; padding:4px 8px; border-radius:8px; border:1px solid #35506b; background:#0a121b; color:var(--text); }
  #testbar button { font-size:14px; padding:5px 12px; border-radius:8px; border:1px solid #35506b; background:#16283b; color:var(--text); cursor:pointer; }
  #debug { display:none; margin:4px 20px 20px; padding:12px 14px; background:#0d1b2a; border:1px solid #24425f; border-radius:12px; font-family:ui-monospace,Menlo,monospace; font-size:13px; line-height:1.5; white-space:pre-wrap; }

  .screen { display:none; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:16px; padding:16px 20px 40px; }
  .screen.show { display:grid; }
  #picker { grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); }

  .namebtn { border:none; border-radius:24px; padding:46px 20px; font-size:clamp(24px,4vw,40px); font-weight:800; color:#0b0f14; cursor:pointer; text-align:center; transition:transform .12s ease; }
  .namebtn:active { transform:scale(0.96); }

  .tile { background:var(--tile); border:none; border-radius:18px; overflow:hidden; cursor:pointer; padding:0; color:var(--text); text-align:left; transition:transform .12s ease, background .12s ease; display:flex; flex-direction:column; }
  .tile:active { transform:scale(0.97); }
  @media (hover:hover){ .tile:hover{ transform:translateY(-3px); background:var(--tile-hover); } .namebtn:hover{ transform:translateY(-3px);} }
  .tile .thumb { width:100%; aspect-ratio:16/9; object-fit:cover; display:block; background:#000; }
  .tile .label { padding:12px 14px 16px; font-size:clamp(16px,2vw,20px); font-weight:700; line-height:1.25; }

  .mosaic { display:grid; width:100%; aspect-ratio:16/9; gap:2px; background:#000; }
  .mosaic.n1 { grid-template-columns:1fr; }
  .mosaic.n2 { grid-template-columns:1fr 1fr; }
  .mosaic.n3, .mosaic.n4 { grid-template-columns:1fr 1fr; grid-template-rows:1fr 1fr; }
  .mosaic.n3 img:first-child { grid-column:1 / span 2; }
  .mosaic img { width:100%; height:100%; object-fit:cover; }

  .empty { grid-column:1 / -1; text-align:center; padding:60px 20px; font-size:clamp(20px,3vw,28px); font-weight:700; opacity:0.6; }

  #overlay { position:fixed; inset:0; background:#000; display:none; z-index:50; }
  #overlay.show { display:block; }
  #player, #overlay iframe { width:100%; height:100%; border:0; display:block; }
  #tapcatch { position:absolute; inset:0; z-index:10; background:transparent; }
  #flash { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); z-index:11; width:96px; height:96px; border-radius:50%; background:#000000aa; display:none; pointer-events:none; background-repeat:no-repeat; background-position:center; background-size:42px; }
  #flash.show { display:block; animation:flashfade .5s ease forwards; }
  @keyframes flashfade { from{opacity:1;transform:translate(-50%,-50%) scale(1);} to{opacity:0;transform:translate(-50%,-50%) scale(1.3);} }
  #close { position:fixed; top:max(14px,env(safe-area-inset-top)); right:max(14px,env(safe-area-inset-right)); z-index:60; width:64px; height:64px; border-radius:50%; border:none; background:#000000aa; color:#fff; font-size:34px; line-height:1; cursor:pointer; display:none; }
  #overlay.show ~ #close { display:block; }
</style>
</head>
<body>

<div id="topbar">
  <button id="back" aria-label="Back">&#8249;</button>
  <header id="header"><span class="brandname">Kids</span>Tube</header>
</div>
<div id="note"></div>

<div id="testbar">
  <span>Test date:</span>
  <input type="date" id="testdate">
  <button id="todayBtn">Today</button>
  <span style="opacity:.6">(remove ?test=1 for the kid view)</span>
</div>
<div id="debug"></div>

<div id="picker" class="screen"></div>
<div id="channels" class="screen"></div>
<div id="grid" class="screen"></div>

<div id="overlay"><div id="player"></div><div id="tapcatch"></div><div id="flash"></div></div>
<button id="close" aria-label="Back">&times;</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script>
/* =========================================================================
   CONFIG — the only part you edit. Three published CSV links (one per tab).

   CHANNELS sheet (header row):
        Channel Name | URL | Availability Level | Videos Per Day | Child
     - URL is ignored by the app (metadata for future auto-populate).
     - Availability Level = a level name defined in the Settings sheet.
     - Videos Per Day = blank shows all; a number shows that many seeded-random
       ones (stable through the day).
     - Child = blank shows to all kids.

   VIDEOS sheet (header row):
        Title | Channel | ID | Availability Override
     - Channel must match a Channel Name.  ID = 11-char YouTube id (URL ok too).
     - Availability Override = a level name that replaces the channel's level for
       just this video (e.g. "Blocked" to hide, "Everyday" to force-show). Blank
       = follow the channel.

   SETTINGS sheet = a levels table plus one special row:
        Level     | Days
        Everyday  | Monday,Tuesday,Wednesday,Thursday,Friday,Saturday,Sunday
        Weekdays  | Monday,Tuesday,Wednesday,Thursday,Friday
        Weekends  | Saturday,Sunday
        Blocked   |
        Global availability override |
     - Each level maps a name to the weekdays it's available (empty = never).
     - "Global availability override": blank = channels use their own level; put
       a level name here to force EVERYTHING (channels + videos) to that level —
       a master switch to block or open everything temporarily.
     - Unknown / empty-days levels fail closed (hidden); debug flags them.

   Test helpers:  ?test=1 (date picker + debug), ?date=YYYY-MM-DD, ?child=Name
   ========================================================================= */

const CHANNELS_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSv_zZ3Ti03lvqwCYtstvOLNPPzlVc7PsQpxzfuybhU0tg9YsF08bAeHGMWbNzGvLxxIZauiA_8tQSt/pub?gid=1846101874&single=true&output=csv";
const VIDEOS_CSV_URL   = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSv_zZ3Ti03lvqwCYtstvOLNPPzlVc7PsQpxzfuybhU0tg9YsF08bAeHGMWbNzGvLxxIZauiA_8tQSt/pub?gid=0&single=true&output=csv";
const SETTINGS_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSv_zZ3Ti03lvqwCYtstvOLNPPzlVc7PsQpxzfuybhU0tg9YsF08bAeHGMWbNzGvLxxIZauiA_8tQSt/pub?gid=493100322&single=true&output=csv";

const DEFAULT_LEVELS = { everyday:[0,1,2,3,4,5,6], weekdays:[1,2,3,4,5], weekends:[6,0], blocked:[] };
const NAME_COLORS = ["#ffcc33","#57d1a0","#68b6ff","#ff8fa3","#c39bff","#ffb570","#8fe3ff","#b6e36b"];

// Demo data (used only if the URLs above are blank)
const DEMO_CHANNELS = [
  { name:"Ball Runs", url:"", level:"Everyday", videosPerDay:null, child:"Sam" },
  { name:"Sand Marbles", url:"", level:"Weekends", videosPerDay:1, child:"Sam" },
  { name:"Shared", url:"", level:"Everyday", videosPerDay:null, child:"" },
];
const DEMO_VIDEOS = [
  { title:"Marble Rally 1", channel:"Ball Runs", id:"SKDJF3cB438", override:"" },
  { title:"Marble Rally 2", channel:"Ball Runs", id:"1MlyJQCv_Lo", override:"" },
  { title:"Marble Rally 3", channel:"Ball Runs", id:"4ajEgMCyxlU", override:"" },
  { title:"Sand 1", channel:"Sand Marbles", id:"0sHu99vdz-A", override:"" },
  { title:"Sand 2", channel:"Sand Marbles", id:"eBZL80a8pKs", override:"" },
  { title:"Shared clip", channel:"Shared", id:"n8nwnN8pnL8", override:"" },
];

/* ----------------------- nothing below needs editing ---------------------- */
let CHANNELS = [], VIDEOS = [], LEVELS = {}, OVERRIDE = null, CHILDREN = [];
let CUR_CHILD = null, CUR_VIEW = "picker", TODAY = [];

const pickerEl = document.getElementById("picker");
const channelsEl = document.getElementById("channels");
const gridEl = document.getElementById("grid");
const headerEl = document.getElementById("header");
const backEl = document.getElementById("back");
const note = document.getElementById("note");
const overlay = document.getElementById("overlay");
const closeBtn = document.getElementById("close");

/* ---------- helpers ---------- */
const norm = s => String(s == null ? "" : s).trim().toLowerCase();
function esc(s){ return String(s).replace(/[&<>"]/g,c=>({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;" }[c])); }
function thumb(id){ return `https://i.ytimg.com/vi/${id}/hqdefault.jpg`; }
function thumbMq(id){ return `https://i.ytimg.com/vi/${id}/mqdefault.jpg`; }
function hashStr(s){ let h=2166136261>>>0; for(let i=0;i<s.length;i++){ h^=s.charCodeAt(i); h=Math.imul(h,16777619);} return h>>>0; }

function effectiveDate(){
  const p = new URLSearchParams(location.search).get("date");
  if (p){ const [y,m,d]=p.split("-").map(Number); if(y&&m&&d) return new Date(y,m-1,d); }
  const n=new Date(); return new Date(n.getFullYear(),n.getMonth(),n.getDate());
}
function dateSeed(d){ return d.getFullYear()*10000 + (d.getMonth()+1)*100 + d.getDate(); }
const DAY_NAMES=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
const WD={ sunday:0,monday:1,tuesday:2,wednesday:3,thursday:4,friday:5,saturday:6, sun:0,mon:1,tue:2,wed:3,thu:4,fri:5,sat:6 };
function parseDays(str){ return (str||"").split(",").map(x=>WD[x.trim().toLowerCase()]).filter(x=>x!==undefined); }

function mulberry32(a){ return function(){ a|=0;a=a+0x6D2B79F5|0; let t=Math.imul(a^a>>>15,1|a); t=t+Math.imul(t^t>>>7,61|t)^t; return((t^t>>>14)>>>0)/4294967296; }; }
function seededShuffle(arr,rng){ const a=arr.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(rng()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

function extractId(row){
  if (row.id && String(row.id).trim()) return String(row.id).trim();
  if (row.url) { const m=String(row.url).match(/(?:v=|youtu\.be\/|embed\/)([A-Za-z0-9_-]{11})/); if(m) return m[1]; }
  return null;
}

/* ---------- parsing ---------- */
function parseChannels(rows){
  return rows.map(r => ({
    name: (r["channel name"]||"").toString().trim(),
    url: (r["url"]||"").toString().trim(),
    level: (r["availability level"]||"").toString().trim(),
    videosPerDay: (()=>{ const v=(r["videos per day"]||"").toString().trim(); if(v==="")return null; const n=parseInt(v,10); return isNaN(n)?null:n; })(),
    child: (r["child"]||"").toString().trim(),
  })).filter(c => c.name);
}
function parseVideos(rows){
  return rows.map(r => ({
    title: (r["title"]||"Video").toString().trim() || "Video",
    channel: (r["channel"]||"").toString().trim(),
    id: extractId(r),
    override: (r["availability override"]||"").toString().trim(),
  })).filter(v => v.id);
}
function parseSettings(grid){
  const levels = {}; let override = null;
  (grid||[]).forEach(row => {
    const a=(row[0]||"").toString().trim(), b=(row[1]||"").toString().trim();
    if(!a) return;
    if(norm(a)==="global availability override"){ override = b || null; return; }
    if(norm(a)==="level" && norm(b)==="days") return; // header
    levels[norm(a)] = parseDays(b);
  });
  return { levels: Object.keys(levels).length ? levels : { ...DEFAULT_LEVELS }, override };
}

/* ---------- availability engine ---------- */
function isLevelActive(levelName, date){
  const days = LEVELS[norm(levelName)];
  if (!days) return false;                 // unknown or empty-days = fail closed
  return days.includes(date.getDay());
}
function channelAvailable(ch, date){ return isLevelActive(OVERRIDE || ch.level, date); }
function videoAllowed(v, date){
  if (OVERRIDE) return isLevelActive(OVERRIDE, date);   // master switch dominates
  if (norm(v.override)) return isLevelActive(v.override, date);
  return true;                                          // inherit channel
}
function videosForChannel(ch, date){
  const cands = VIDEOS.filter(v => norm(v.channel)===norm(ch.name) && videoAllowed(v, date));
  const n = ch.videosPerDay;
  if (n == null || n >= cands.length) return cands;
  return seededShuffle(cands, mulberry32(dateSeed(date) ^ hashStr(norm(ch.name)))).slice(0, n);
}
function childChannels(child){
  return CHANNELS.filter(c => child==null || norm(c.child)==="" || norm(c.child)===norm(child));
}
function computeToday(child, date){
  return childChannels(child)
    .filter(c => channelAvailable(c, date))
    .map(c => ({ channel:c, videos: videosForChannel(c, date) }))
    .filter(x => x.videos.length > 0);
}
function distinctChildren(channels){
  const seen=new Set(), out=[];
  channels.forEach(c=>{ const v=(c.child||"").trim(); if(v && !seen.has(v.toLowerCase())){ seen.add(v.toLowerCase()); out.push(v);} });
  return out;
}

/* ---------- rendering ---------- */
function setHeader(child){ headerEl.innerHTML = `<span class="brandname">${esc(child||"Kids")}</span>Tube`; }
function showView(name){
  pickerEl.classList.toggle("show", name==="picker");
  channelsEl.classList.toggle("show", name==="channels");
  gridEl.classList.toggle("show", name==="grid");
  CUR_VIEW = name;
  updateBack();
}
function updateBack(){
  const show = (CUR_VIEW==="grid") || (CUR_VIEW==="channels" && CHILDREN.length>=2);
  backEl.classList.toggle("show", show);
  backEl.onclick = !show ? null : () => { if (CUR_VIEW==="grid") showChannels(CUR_CHILD); else showPicker(); };
}
function emptyMsg(txt){ const d=document.createElement("div"); d.className="empty"; d.textContent=txt; return d; }

function showPicker(){
  setHeader(null);
  pickerEl.innerHTML="";
  CHILDREN.forEach((name,i)=>{
    const b=document.createElement("button"); b.className="namebtn"; b.textContent=name;
    b.style.background=NAME_COLORS[i%NAME_COLORS.length];
    b.onclick=()=>showChannels(name);
    pickerEl.appendChild(b);
  });
  showView("picker");
  document.getElementById("debug").style.display="none";
  document.getElementById("testbar").style.display="none";
}
function showChannels(child){
  CUR_CHILD = child;
  setHeader(child);
  const date = effectiveDate();
  TODAY = computeToday(child, date);
  channelsEl.innerHTML="";
  if(!TODAY.length){ channelsEl.appendChild(emptyMsg("Nothing to watch right now")); }
  TODAY.forEach(({channel,videos})=>{
    const btn=document.createElement("button"); btn.className="tile";
    const ids=videos.slice(0,4).map(v=>v.id);
    const mos=document.createElement("div"); mos.className="mosaic n"+ids.length;
    ids.forEach(id=>{ const im=document.createElement("img"); im.loading="lazy"; im.src=thumb(id); im.onerror=()=>{im.src=thumbMq(id);}; mos.appendChild(im); });
    const label=document.createElement("div"); label.className="label"; label.textContent=channel.name;
    btn.appendChild(mos); btn.appendChild(label);
    btn.onclick=()=>showVideos(channel.name);
    channelsEl.appendChild(btn);
  });
  showView("channels");
  if(isTestMode()){ setupTestBar(date, child); renderDebug(buildDebug(child,date)); }
}
function showVideos(channelName){
  const entry = TODAY.find(x=>norm(x.channel.name)===norm(channelName));
  const videos = entry ? entry.videos : [];
  gridEl.innerHTML="";
  if(!videos.length){ gridEl.appendChild(emptyMsg("Nothing here today")); }
  videos.forEach(item=>{
    const btn=document.createElement("button"); btn.className="tile"; btn.onclick=()=>openVideo(item.id);
    const img=document.createElement("img"); img.className="thumb"; img.loading="lazy";
    img.src=thumb(item.id); img.onerror=()=>{ img.src=thumbMq(item.id); };
    const label=document.createElement("div"); label.className="label"; label.textContent=item.title;
    btn.appendChild(img); btn.appendChild(label); gridEl.appendChild(btn);
  });
  showView("grid");
}

/* ---------- debug ---------- */
function buildDebug(child, date){
  const L=[];
  if(child) L.push("Child: "+child);
  L.push(`Date: ${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,"0")}-${String(date.getDate()).padStart(2,"0")}  (${DAY_NAMES[date.getDay()]})`);
  L.push(`Global override: ${OVERRIDE ? OVERRIDE + (LEVELS[norm(OVERRIDE)] ? "" : "   *** unknown level ***") : "(none — channels use own level)"}`);
  L.push("Channels for this profile:");
  const list = childChannels(child);
  if(!list.length) L.push("   (none tagged for this child)");
  list.forEach(c=>{
    const lvl = OVERRIDE || c.level;
    const known = !!LEVELS[norm(lvl)];
    const avail = channelAvailable(c,date);
    const vids = avail ? videosForChannel(c,date).length : 0;
    L.push(`   ${c.name} — level "${c.level||"(none)"}"${OVERRIDE?` -> override "${OVERRIDE}"`:""} — ${avail?"AVAILABLE":"hidden"} — ${vids} video(s)${known?"":"   *** unknown level ***"}`);
  });
  return L.join("\n");
}
function renderDebug(text){ const el=document.getElementById("debug"); el.style.display="block"; el.textContent=text; }

/* ---------- YouTube player (sealed: no controls, tap-catch over everything) ---------- */
let ytReady=false, player=null, pendingId=null;
window.onYouTubeIframeAPIReady=()=>{ ytReady=true; if(pendingId){ startPlayer(pendingId); pendingId=null; } };
(function(){ const s=document.createElement("script"); s.src="https://www.youtube.com/iframe_api"; document.head.appendChild(s); })();
function openVideo(id){ overlay.classList.add("show"); closeBtn.style.display="block"; if(ytReady) startPlayer(id); else pendingId=id; }
function startPlayer(id){
  if(player){ player.loadVideoById(id); return; }
  player=new YT.Player("player",{
    width:"100%", height:"100%", videoId:id,
    playerVars:{ autoplay:1, controls:0, rel:0, modestbranding:1, playsinline:1, fs:0, disablekb:1, iv_load_policy:3, origin:location.origin },
    events:{ onReady:e=>e.target.playVideo(), onStateChange:e=>{ if(e.data===YT.PlayerState.ENDED) closeVideo(); } }
  });
}
function closeVideo(){ overlay.classList.remove("show"); closeBtn.style.display="none"; if(player){ try{player.stopVideo();}catch(_){} } }
closeBtn.onclick=closeVideo;
const PLAY_ICON="url(\"data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white'><path d='M8 5v14l11-7z'/></svg>\")";
const PAUSE_ICON="url(\"data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white'><path d='M6 5h4v14H6zM14 5h4v14h-4z'/></svg>\")";
const tapcatch=document.getElementById("tapcatch"), flash=document.getElementById("flash");
function flashIcon(kind){ flash.style.backgroundImage=kind==="play"?PLAY_ICON:PAUSE_ICON; flash.classList.remove("show"); void flash.offsetWidth; flash.classList.add("show"); }
tapcatch.addEventListener("click",()=>{ if(!player||!player.getPlayerState) return; if(player.getPlayerState()===YT.PlayerState.PLAYING){ player.pauseVideo(); flashIcon("pause"); } else { player.playVideo(); flashIcon("play"); } });
tapcatch.addEventListener("contextmenu",e=>e.preventDefault());

/* ---------- test mode + loading ---------- */
function isTestMode(){ return new URLSearchParams(location.search).get("test")==="1"; }
function currentChildParam(){ return new URLSearchParams(location.search).get("child"); }
function setupTestBar(date, child){
  const bar=document.getElementById("testbar"); bar.style.display="flex";
  const input=document.getElementById("testdate");
  input.value=`${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,"0")}-${String(date.getDate()).padStart(2,"0")}`;
  const childQ = child ? `&child=${encodeURIComponent(child)}` : "";
  input.onchange=()=>{ location.search=`?test=1&date=${input.value}${childQ}`; };
  document.getElementById("todayBtn").onclick=()=>{ location.search=`?test=1${childQ}`; };
}
function loadCsv(url,opts){ return new Promise(res=>{ if(!url) return res(null); Papa.parse(url,{ download:true, skipEmptyLines:true, ...opts, complete:r=>res(r.data), error:()=>res(null) }); }); }

async function boot(){
  const [chRows, viRows, seGrid] = await Promise.all([
    loadCsv(CHANNELS_CSV_URL, { header:true, transformHeader:h=>h.trim().toLowerCase() }),
    loadCsv(VIDEOS_CSV_URL,   { header:true, transformHeader:h=>h.trim().toLowerCase() }),
    loadCsv(SETTINGS_CSV_URL, { header:false }),
  ]);

  CHANNELS = (chRows && chRows.length) ? parseChannels(chRows) : DEMO_CHANNELS.slice();
  VIDEOS   = (viRows && viRows.length) ? parseVideos(viRows)   : DEMO_VIDEOS.slice();
  const st = seGrid ? parseSettings(seGrid) : { levels:{...DEFAULT_LEVELS}, override:null };
  LEVELS = st.levels; OVERRIDE = st.override;
  if (!CHANNELS_CSV_URL && isTestMode()) note.textContent = "Demo data — set the CSV URLs to use your own sheets.";

  CHILDREN = distinctChildren(CHANNELS);
  const urlChild = currentChildParam();
  const matched = urlChild && CHILDREN.find(c => c.toLowerCase()===urlChild.toLowerCase());

  if (CHILDREN.length >= 2 && !matched) showPicker();
  else showChannels(matched || (CHILDREN.length===1 ? CHILDREN[0] : null));
}
boot();
</script>
</body>
</html>
